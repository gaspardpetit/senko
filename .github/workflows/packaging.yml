name: Packaging

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cibw_arch: x86_64
          - name: windows-amd64
            os: windows-latest
            cibw_arch: AMD64
          - name: macos-arm64
            os: macos-14
            cibw_arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install cibuildwheel
        run: uv pip install --system cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: cp311-*
          CIBW_SKIP: "*-musllinux*"
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          CIBW_TEST_COMMAND: python {project}/scripts/packaging_smoke.py
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Audit wheel artifacts
        run: python scripts/check_dist_artifacts.py wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install build frontend
        run: uv pip install --system build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Audit sdist artifact
        run: python scripts/check_dist_artifacts.py dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  summarize-artifacts:
    name: Summarize artifacts
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit all artifacts
        run: python scripts/check_dist_artifacts.py dist
